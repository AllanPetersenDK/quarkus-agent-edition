quarkus.http.port=8080
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:file:./target/agent-state/agent-state;AUTO_SERVER=FALSE;DB_CLOSE_ON_EXIT=FALSE
quarkus.datasource.username=sa
quarkus.datasource.password=sa
quarkus.flyway.migrate-at-start=true
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
quarkus.smallrye-openapi.info-title=Quarkus Agent Edition API
quarkus.smallrye-openapi.info-version=0.1.0
quarkus.smallrye-openapi.info-description=Quarkus companion edition of Build an AI Agent from Scratch. Swagger documents the HTTP-exposed outer seams: manual agent runs, tool discovery, runtime health, RAG query and ingest, session and memory inspection, evaluation run and trace lookup, and the selected LangChain4j companion demos. Manual orchestration internals, selector logic, prompt builders, and low-level storage details remain Java-only unless a specific endpoint exposes them.
quarkus.http.cors.enabled=true
quarkus.micrometer.binder.netty.enabled=false
quarkus.mcp.server.http.root-path=/mcp
openai.api-key=${OPENAI_API_KEY:}
quarkus.langchain4j.openai.api-key=${OPENAI_API_KEY:}
quarkus.langchain4j.openai.chat-model.model-name=${openai.model:gpt-4.1-mini}
quarkus.langchain4j.openai.chat-model.temperature=${openai.temperature:0}
quarkus.otel.exporter.otlp.enabled=false
agent.max-iterations=12
agent.context.max-tokens=600
agent.llm-provider=auto
agent.system-prompt=You are a helpful Quarkus agent. Answer simple, timeless, widely known facts directly without tools. Use tools only when the answer depends on current information, external verification, session memory, or the user explicitly asks you to look something up. Prefer the most specific tool and do not use knowledge-base, wikipedia, or web-search for basic general knowledge. Use web-search for live web pages, current events, video lookup, source verification, or any question that needs up-to-date external information. When the user asks for a species, type, name, or other specific entity, answer with the most specific named entity supported by the evidence, not a broader category. When the user asks to delete or remove a file in the workspace, use the confirmation-gated delete-file tool and wait for approval before acting. When exploring files or archives, use inspect_path, list_files, unzip_file, read_file, and read_document_file step by step and inspect the workspace incrementally instead of guessing. Examples: What is the capital of France? -> answer directly. What time is it right now? -> use clock. Search Wikipedia for the capital of France. -> use wikipedia because the user explicitly requested lookup.
agent.companion.async-batch.max-concurrency=4
gaia.validation.hf-token=${GAIA_HF_TOKEN:${HF_TOKEN:${HUGGINGFACE_TOKEN:}}}
gaia.validation.dataset-url=${GAIA_DATASET_URL:}
gaia.validation.local-path=${GAIA_LOCAL_PATH:target/gaia-data}
gaia.validation.default-limit=${GAIA_DEFAULT_LIMIT:10}
gaia.validation.default-level=${GAIA_DEFAULT_LEVEL:1}
gaia.validation.default-config=${GAIA_DEFAULT_CONFIG:2023}
gaia.validation.default-split=${GAIA_DEFAULT_SPLIT:validation}
gaia.validation.audio-transcription-model=${GAIA_AUDIO_TRANSCRIPTION_MODEL:gpt-4o-mini-transcribe}
code.workspace-root=target/workspace
